name: Build
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
      - run: npm ci
      - name: Build app
        run: npx tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: cscec-payment-linux
          path: src-tauri/target/release/cscec-payment

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: npm ci
      - name: Build app
        run: npx tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: cscec-payment-windows
          path: src-tauri/target/release/cscec-payment.exe
