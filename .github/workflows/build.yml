name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run tauri build -- --bundles msi

      - uses: actions/upload-artifact@v4
        with:
          name: cscec-payment-windows
          path: src-tauri/target/release/cscec-payment.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - run: npm install

      - run: npm run tauri build -- --bundles deb

      - uses: actions/upload-artifact@v4
        with:
          name: cscec-payment-linux
          path: |
            src-tauri/target/release/cscec-payment
            src-tauri/target/release/bundle/deb/*.deb
